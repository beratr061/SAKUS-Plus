name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Check if local.properties config exists, populate if required (e.g. MAPS_API_KEY)
      - name: Setup local.properties
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── DEBUG BUILD ───────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ─── KEYSTORE KURULUMU ─────────────────────────────────
      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          fi

      # ─── RELEASE BUILD ─────────────────────────────────────
      - name: Build Release APK (Signed)
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ─── APK'LARI RELEASE'E EKLE ───────────────────────────
      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q :app:printVersionName 2>/dev/null || echo "1.0.0")
          echo "name=v$VERSION-$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release & Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: "Release ${{ steps.version.outputs.name }}"
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
